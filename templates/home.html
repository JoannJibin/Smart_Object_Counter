<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOW MANY?? 🔍</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffd6e7 0%, #c8f0fe 50%, #d4f5d4 100%);
      overflow: hidden;
      padding: 20px;
    }

    /* Floating background bubbles */
    .bubble {
      position: fixed;
      border-radius: 50%;
      opacity: 0.35;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }
    .bubble:nth-child(1){ width:120px; height:120px; background:#ff9fd8; top:10%; left:5%;  animation-delay:0s; }
    .bubble:nth-child(2){ width:80px;  height:80px;  background:#9fd8ff; top:70%; left:8%;  animation-delay:2s; }
    .bubble:nth-child(3){ width:160px; height:160px; background:#a8f0a8; top:15%; right:6%; animation-delay:1s; }
    .bubble:nth-child(4){ width:60px;  height:60px;  background:#ffe599; top:75%; right:9%; animation-delay:3s; }
    .bubble:nth-child(5){ width:100px; height:100px; background:#d0b8f5; top:45%; left:2%;  animation-delay:1.5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-30px) rotate(10deg); }
    }

    /* Card */
    .card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 2px solid rgba(255,255,255,0.85);
      border-radius: 32px;
      padding: 52px 60px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 16px 48px rgba(150, 100, 200, 0.18);
      text-align: center;
      position: relative;
      z-index: 1;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    .mascot {
      font-size: 72px;
      display: block;
      margin-bottom: 8px;
      animation: wiggle 2.5s ease-in-out infinite;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(-6deg); }
      50%       { transform: rotate(6deg); }
    }

    h1 {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(90deg, #ff6fb4, #7c5cbf, #3db9cf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
      margin-bottom: 8px;
    }

    .tagline {
      color: #6b7a99;
      font-size: 1.05rem;
      margin-bottom: 36px;
    }

    .btn-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      padding: 16px 32px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.25);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn:hover::after { opacity: 1; }
    .btn:hover { transform: translateY(-4px) scale(1.04); }
    .btn:active { transform: scale(0.97); }

    .btn-upload {
      background: linear-gradient(135deg, #ff79c6, #bd5dc9);
      color: #fff;
      box-shadow: 0 6px 20px rgba(189,93,201,0.4);
    }
    .btn-upload:hover { box-shadow: 0 10px 28px rgba(189,93,201,0.55); }

    .btn-webcam {
      background: linear-gradient(135deg, #4ecdc4, #2eb5c9);
      color: #fff;
      box-shadow: 0 6px 20px rgba(46,181,201,0.4);
    }
    .btn-webcam:hover { box-shadow: 0 10px 28px rgba(46,181,201,0.55); }

    footer {
      margin-top: 28px;
      font-size: 0.8rem;
      color: #aab3c7;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- Floating bubbles -->
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <div class="card">
    <span class="mascot">🔍</span>
    <h1>HOW MANY??</h1>
    <p class="tagline">Point a picture or your camera at anything — I'll count every single thing! ✨</p>

    <div class="btn-row">
      <a href="/upload" class="btn btn-upload">📸 Upload Pic</a>
      <a href="/webcam" class="btn btn-webcam">🎥 Webcam</a>
    </div>
  </div>

  <footer>Powered by YOLOv8 &nbsp;·&nbsp; Made with 💜</footer>

</body>
</html>
